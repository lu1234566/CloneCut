name: Apply CloneCut corrections

on:
  push:
    branches: [ main ]
    paths:
      - '.clonecut_corrections/**'
      - '.github/workflows/apply-clonecut-corrections.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-corrections:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply correction patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          cat \
            .clonecut_corrections/part_00.diff \
            .clonecut_corrections/part_01.diff \
            .clonecut_corrections/part_02.diff \
            .clonecut_corrections/part_03.diff \
            .clonecut_corrections/part_04.diff \
            .clonecut_corrections/part_05.diff \
            .clonecut_corrections/part_06.diff > /tmp/CloneCut_correcoes.diff
          base64 -d .clonecut_corrections/part_07.diff.b64 >> /tmp/CloneCut_correcoes.diff

          git apply --whitespace=fix /tmp/CloneCut_correcoes.diff
          rm -f __tmp_probe*.txt __tmp_nonexistent
          rm -rf .clonecut_corrections

          git add README.md \
            app/build.gradle.kts \
            app/src/main/java/com/example/MainActivity.kt \
            app/src/main/java/com/example/data/api/GeminiApi.kt \
            app/src/main/java/com/example/data/local/ChatDatabase.kt \
            app/src/main/java/com/example/data/repository/ChatRepository.kt \
            app/src/main/java/com/example/ui/ChatViewModel.kt \
            app/src/test/java/com/example/ExampleRobolectricTest.kt \
            gradle/libs.versions.toml
          git add -A .clonecut_corrections || true
          git add -u -- __tmp_probe*.txt __tmp_nonexistent || true

          if git diff --cached --quiet; then
            echo "No correction changes to commit."
            exit 0
          fi

          git commit -m "Apply CloneCut corrections"
          git push origin HEAD:main
