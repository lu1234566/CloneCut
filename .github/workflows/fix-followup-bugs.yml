name: Fix follow-up bugs

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/fix-followup-bugs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-fixes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Patch project files
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          repo = Path('.')

          crp = repo / 'app/src/main/java/com/example/data/repository/ChatRepository.kt'
          cr = crp.read_text(encoding='utf-8')
          for old, new in {
            "${'$'}targetDurationSec": "$targetDurationSec",
            "${'$'}niche": "$niche",
            "${'$'}userRequests": "$userRequests",
            'id = "ai_$index"': 'id = "ai_${index}_${System.nanoTime()}"',
            'GenerationConfig(temperature = 0.7)': 'GenerationConfig(temperature = 0.7, maxOutputTokens = 512)',
            '?.text ?: ""': '?.text.orEmpty()'
          }.items():
              cr = cr.replace(old, new)
          crp.write_text(cr, encoding='utf-8')

          vmp = repo / 'app/src/main/java/com/example/ui/ChatViewModel.kt'
          vm = vmp.read_text(encoding='utf-8')
          vm = vm.replace('private var hasBootstrappedProjects = false', 'private var hasBootstrappedProjects = sharedPrefs.getBoolean("starter_project_bootstrapped", false)')
          vm = vm.replace('hasBootstrappedProjects = true\n                        createStarterProject("Meu Vídeo Autoral 1")', 'hasBootstrappedProjects = true\n                        sharedPrefs.edit().putBoolean("starter_project_bootstrapped", true).apply()\n                        createStarterProject("Meu Vídeo Autoral 1")')
          vm = vm.replace('hasBootstrappedProjects = true\n                    if (_activeProject.value == null) {', 'hasBootstrappedProjects = true\n                    sharedPrefs.edit().putBoolean("starter_project_bootstrapped", true).apply()\n                    if (_activeProject.value == null) {')
          vm = vm.replace('aud.copy(volume = newVol)', 'aud.copy(volume = newVol.coerceIn(0f, 1f))')
          start = vm.find('    fun generateAiContentToTimeline() {')
          marker = '\n    // --- SAVING & CREATING PROJECTS IN DATABASE ---'
          end = vm.find(marker, start)
          if start != -1 and end != -1:
              vm = vm[:start] + '''    fun generateAiContentToTimeline() {
        val topic = _aiTopicInput.value.trim()
        if (topic.isBlank() || _isGeneratingAi.value) return
        _isGeneratingAi.value = true

        viewModelScope.launch {
            try {
                val duration = getMaxTimelineDuration().toInt().coerceIn(10, 60)
                val responseCaptions = repository.draftAiScriptToTimeline(
                    niche = topic,
                    targetDurationSec = duration,
                    userRequests = "Incluir ganchos rápidos para redes sociais",
                    customApiKey = _customApiKey.value
                )
                if (responseCaptions.isNotEmpty()) {
                    _activeTexts.value = (_activeTexts.value + responseCaptions).sortedBy { it.startSec }
                    val newAudios = responseCaptions.map { sub ->
                        val shortCaps = if (sub.text.length > 20) sub.text.take(20) + "..." else sub.text
                        AudioTimelineClip(
                            id = "narrator_ai_${UUID.randomUUID()}",
                            audioName = "IA Voz: \"$shortCaps\"",
                            startSec = sub.startSec,
                            durationSec = sub.durationSec.coerceAtLeast(0.5f),
                            volume = 1.0f,
                            isNarratorVoice = true
                        )
                    }
                    _activeAudio.value = (_activeAudio.value + newAudios).sortedBy { it.startSec }
                    saveCurrentStateToDb()
                }
                _aiTopicInput.value = ""
            } finally {
                _isGeneratingAi.value = false
            }
        }
    }
''' + vm[end:]
          vmp.write_text(vm, encoding='utf-8')

          sp = repo / 'settings.gradle.kts'
          settings = sp.read_text(encoding='utf-8').replace('rootProject.name = "My Application"', 'rootProject.name = "CloneCut"')
          sp.write_text(settings, encoding='utf-8')

          for rel in ['.github/workflows/apply-clonecut-corrections.yml', '.github/workflows/fix-followup-bugs.yml']:
              p = repo / rel
              if p.exists():
                  p.unlink()
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix remaining CloneCut bugs" || exit 0
          git push origin HEAD:main
